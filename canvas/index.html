<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas for Copilot</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        width: 100%;
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          sans-serif;
        background: #0b0a12;
      }

      #cy {
        position: absolute;
        inset: 0;
        height: 100%;
        width: 100%;
        background:
          radial-gradient(
            1100px 600px at 18% -10%,
            rgba(139, 92, 246, 0.2),
            transparent 60%
          ),
          radial-gradient(
            900px 520px at 100% 0%,
            rgba(217, 70, 239, 0.14),
            transparent 55%
          ),
          #0b0a12;
      }

      /* Zoom / reset controls — dark glass cluster, top-right (FR-3). */
      #controls {
        position: absolute;
        top: 16px;
        right: 16px;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      .zoom-group {
        display: flex;
        flex-direction: column;
        border-radius: 16px;
        overflow: hidden;
        background: rgba(30, 27, 46, 0.66);
        backdrop-filter: blur(14px) saturate(160%);
        -webkit-backdrop-filter: blur(14px) saturate(160%);
        border: 1px solid rgba(139, 92, 246, 0.35);
        box-shadow:
          0 8px 26px rgba(124, 58, 237, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }

      .control-btn {
        width: 44px;
        height: 44px;
        display: grid;
        place-items: center;
        padding: 0;
        border: none;
        background: transparent;
        color: #c4b5fd;
        cursor: pointer;
        transition:
          background 0.18s ease,
          color 0.18s ease,
          box-shadow 0.18s ease,
          transform 0.12s ease;
      }

      .control-btn:hover {
        background: rgba(139, 92, 246, 0.22);
        color: #ffffff;
      }

      .control-btn:active {
        transform: scale(0.9);
      }

      .control-btn:focus-visible {
        outline: 2px solid #a78bfa;
        outline-offset: -2px;
      }

      .control-btn svg {
        width: 20px;
        height: 20px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .zoom-group .control-btn + .control-btn {
        border-top: 1px solid rgba(139, 92, 246, 0.25);
      }

      .reset-btn {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: rgba(30, 27, 46, 0.66);
        backdrop-filter: blur(14px) saturate(160%);
        -webkit-backdrop-filter: blur(14px) saturate(160%);
        border: 1px solid rgba(139, 92, 246, 0.35);
        box-shadow:
          0 8px 26px rgba(124, 58, 237, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }

      .reset-btn:hover {
        background: rgba(139, 92, 246, 0.3);
        box-shadow:
          0 10px 30px rgba(168, 85, 247, 0.42),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }

      /* Readable error overlay — shown instead of a blank canvas (FR-1, TC-2). */
      #error {
        position: absolute;
        inset: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: rgba(8, 7, 14, 0.82);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
      }

      #error[hidden] {
        display: none;
      }

      .error-card {
        max-width: 520px;
        width: 100%;
        background: #18152a;
        border-radius: 16px;
        border: 1px solid rgba(244, 63, 94, 0.4);
        border-top: 3px solid #fb7185;
        padding: 22px 26px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.55);
        color: #e9e7f5;
      }

      .error-card h2 {
        margin: 0 0 8px;
        font-size: 16px;
        color: #fb7185;
      }

      .error-hint {
        margin: 0 0 12px;
        font-size: 13px;
        color: #a9a3c2;
      }

      #error-list {
        margin: 0;
        padding-left: 20px;
        font-size: 13px;
        line-height: 1.6;
        color: #d9d4ee;
      }

      #error-list li {
        margin-bottom: 4px;
      }
    </style>
  </head>
  <body>
    <div id="cy"></div>

    <div id="controls" role="group" aria-label="Zoom and view controls">
      <div class="zoom-group">
        <button
          id="zoom-in-btn"
          class="control-btn"
          type="button"
          title="Zoom in"
          aria-label="Zoom in"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
        </button>
        <button
          id="zoom-out-btn"
          class="control-btn"
          type="button"
          title="Zoom out"
          aria-label="Zoom out"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
        </button>
      </div>
      <button
        id="reset-btn"
        class="control-btn reset-btn"
        type="button"
        title="Reset view (fit to screen)"
        aria-label="Reset view"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 9V5a1 1 0 0 1 1-1h4" />
          <path d="M20 9V5a1 1 0 0 0-1-1h-4" />
          <path d="M4 15v4a1 1 0 0 0 1 1h4" />
          <path d="M20 15v4a1 1 0 0 1-1 1h-4" />
        </svg>
      </button>
    </div>

    <div id="error" role="alert" hidden>
      <div class="error-card">
        <h2 id="error-title">Couldn't render the diagram</h2>
        <p class="error-hint">
          The graph model was invalid, so nothing was drawn. Fix the issues below
          and regenerate the diagram.
        </p>
        <ul id="error-list"></ul>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
