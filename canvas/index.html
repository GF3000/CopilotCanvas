<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas for Copilot</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-base: #0b0a12;
        --bg-glow-1: rgba(139, 92, 246, 0.2);
        --bg-glow-2: rgba(217, 70, 239, 0.14);
        --surface: rgba(30, 27, 46, 0.66);
        --surface-solid: #18152a;
        --surface-border: rgba(139, 92, 246, 0.35);
        --surface-shadow: rgba(124, 58, 237, 0.28);
        --surface-inset: rgba(255, 255, 255, 0.06);
        --divider: rgba(139, 92, 246, 0.25);
        --icon: #c4b5fd;
        --icon-hover: #ffffff;
        --hover-bg: rgba(139, 92, 246, 0.22);
        --hover-bg-strong: rgba(139, 92, 246, 0.3);
        --focus-ring: #a78bfa;
        --scrim: rgba(8, 7, 14, 0.82);
        --text: #e9e7f5;
        --text-muted: #a9a3c2;
        --list-text: #d9d4ee;
        --error-accent: #fb7185;
        --error-border: rgba(244, 63, 94, 0.4);
        --node-glow: rgba(139, 92, 246, 0.5);
      }

      [data-theme='light'] {
        color-scheme: light;
        --bg-base: #f4f3fb;
        --bg-glow-1: rgba(139, 92, 246, 0.12);
        --bg-glow-2: rgba(217, 70, 239, 0.08);
        --surface: rgba(255, 255, 255, 0.72);
        --surface-solid: #ffffff;
        --surface-border: rgba(124, 58, 237, 0.28);
        --surface-shadow: rgba(124, 58, 237, 0.16);
        --surface-inset: rgba(255, 255, 255, 0.6);
        --divider: rgba(124, 58, 237, 0.18);
        --icon: #6d28d9;
        --icon-hover: #4c1d95;
        --hover-bg: rgba(139, 92, 246, 0.14);
        --hover-bg-strong: rgba(139, 92, 246, 0.2);
        --focus-ring: #7c3aed;
        --scrim: rgba(40, 33, 64, 0.4);
        --text: #2a2440;
        --text-muted: #6b647e;
        --list-text: #4b4564;
        --error-accent: #e11d48;
        --error-border: rgba(225, 29, 72, 0.35);
        --node-glow: rgba(139, 92, 246, 0.32);
      }

      html,
      body {
        margin: 0;
        height: 100%;
        width: 100%;
        font-family:
          'Segoe UI Variable Display',
          'Segoe UI',
          system-ui,
          -apple-system,
          'Helvetica Neue',
          Arial,
          sans-serif;
        background: var(--bg-base);
      }

      #cy {
        position: absolute;
        inset: 0;
        height: 100%;
        width: 100%;
        background:
          radial-gradient(
            1100px 600px at 18% -10%,
            var(--bg-glow-1),
            transparent 60%
          ),
          radial-gradient(
            900px 520px at 100% 0%,
            var(--bg-glow-2),
            transparent 55%
          ),
          var(--bg-base);
        transition: background 0.3s ease;
      }

      /* Soft node/edge glow — a real blur (Cytoscape has no native shadow). */
      #cy canvas {
        filter: drop-shadow(0 0 5px var(--node-glow));
      }

      /* Zoom / reset / theme controls — glass cluster, top-right (FR-3). */
      #controls {
        position: absolute;
        top: 16px;
        right: 16px;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      .zoom-group {
        display: flex;
        flex-direction: column;
        border-radius: 16px;
        overflow: hidden;
        background: var(--surface);
        backdrop-filter: blur(14px) saturate(160%);
        -webkit-backdrop-filter: blur(14px) saturate(160%);
        border: 1px solid var(--surface-border);
        box-shadow:
          0 8px 26px var(--surface-shadow),
          inset 0 1px 0 var(--surface-inset);
      }

      .control-btn {
        width: 44px;
        height: 44px;
        display: grid;
        place-items: center;
        padding: 0;
        border: none;
        background: transparent;
        color: var(--icon);
        cursor: pointer;
        transition:
          background 0.18s ease,
          color 0.18s ease,
          box-shadow 0.18s ease,
          transform 0.12s ease;
      }

      .control-btn:hover {
        background: var(--hover-bg);
        color: var(--icon-hover);
      }

      .control-btn:active {
        transform: scale(0.9);
      }

      .control-btn:focus-visible {
        outline: 2px solid var(--focus-ring);
        outline-offset: -2px;
      }

      .control-btn svg {
        width: 20px;
        height: 20px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .zoom-group .control-btn + .control-btn {
        border-top: 1px solid var(--divider);
      }

      .reset-btn {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: var(--surface);
        backdrop-filter: blur(14px) saturate(160%);
        -webkit-backdrop-filter: blur(14px) saturate(160%);
        border: 1px solid var(--surface-border);
        box-shadow:
          0 8px 26px var(--surface-shadow),
          inset 0 1px 0 var(--surface-inset);
      }

      .reset-btn:hover {
        background: var(--hover-bg-strong);
        box-shadow:
          0 10px 30px var(--surface-shadow),
          inset 0 1px 0 var(--surface-inset);
      }

      /* Theme toggle: show the icon of the theme you'll switch TO. */
      .icon-sun,
      .icon-moon {
        display: none;
      }

      [data-theme='dark'] #theme-toggle-btn .icon-sun {
        display: block;
      }

      [data-theme='light'] #theme-toggle-btn .icon-moon {
        display: block;
      }

      /* Diagram title — glass pill, top-left. */
      #title-bar {
        position: absolute;
        top: 16px;
        left: 16px;
        z-index: 10;
        max-width: 60vw;
        padding: 8px 14px;
        border-radius: 14px;
        background: var(--surface);
        backdrop-filter: blur(14px) saturate(160%);
        -webkit-backdrop-filter: blur(14px) saturate(160%);
        border: 1px solid var(--surface-border);
        box-shadow:
          0 8px 26px var(--surface-shadow),
          inset 0 1px 0 var(--surface-inset);
      }

      #diagram-title {
        margin: 0;
        padding: 3px 8px;
        font-size: 18px;
        font-weight: 600;
        line-height: 1.3;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        border-radius: 8px;
        cursor: text;
        outline: none;
        transition:
          background 0.15s ease,
          box-shadow 0.15s ease;
      }

      #diagram-title:hover {
        background: var(--hover-bg);
      }

      #diagram-title:focus {
        background: var(--hover-bg);
        box-shadow: 0 0 0 2px var(--focus-ring);
      }

      #diagram-title.is-placeholder {
        color: var(--text-muted);
        font-weight: 500;
        font-style: italic;
      }

      /* Readable error overlay — shown instead of a blank canvas (FR-1, TC-2). */
      #error {
        position: absolute;
        inset: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: var(--scrim);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
      }

      #error[hidden] {
        display: none;
      }

      .error-card {
        max-width: 520px;
        width: 100%;
        background: var(--surface-solid);
        border-radius: 16px;
        border: 1px solid var(--error-border);
        border-top: 3px solid var(--error-accent);
        padding: 22px 26px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
        color: var(--text);
      }

      .error-card h2 {
        margin: 0 0 8px;
        font-size: 16px;
        color: var(--error-accent);
      }

      .error-hint {
        margin: 0 0 12px;
        font-size: 13px;
        color: var(--text-muted);
      }

      #error-list {
        margin: 0;
        padding-left: 20px;
        font-size: 13px;
        line-height: 1.6;
        color: var(--list-text);
      }

      #error-list li {
        margin-bottom: 4px;
      }
    </style>
  </head>
  <body>
    <div id="cy"></div>

    <div id="title-bar">
      <h1
        id="diagram-title"
        class="is-placeholder"
        contenteditable="true"
        spellcheck="false"
        aria-label="Diagram title — click to rename"
        title="Click to rename"
      >
        Untitled diagram
      </h1>
    </div>

    <div id="controls" role="group" aria-label="Zoom and view controls">
      <div class="zoom-group">
        <button
          id="zoom-in-btn"
          class="control-btn"
          type="button"
          title="Zoom in"
          aria-label="Zoom in"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
        </button>
        <button
          id="zoom-out-btn"
          class="control-btn"
          type="button"
          title="Zoom out"
          aria-label="Zoom out"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
        </button>
      </div>
      <button
        id="reset-btn"
        class="control-btn reset-btn"
        type="button"
        title="Reset view (fit to screen)"
        aria-label="Reset view"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 9V5a1 1 0 0 1 1-1h4" />
          <path d="M20 9V5a1 1 0 0 0-1-1h-4" />
          <path d="M4 15v4a1 1 0 0 0 1 1h4" />
          <path d="M20 15v4a1 1 0 0 1-1 1h-4" />
        </svg>
      </button>
      <button
        id="theme-toggle-btn"
        class="control-btn reset-btn"
        type="button"
        title="Switch theme"
        aria-label="Switch theme"
      >
        <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="4" />
          <path
            d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"
          />
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z" />
        </svg>
      </button>
    </div>

    <div id="error" role="alert" hidden>
      <div class="error-card">
        <h2 id="error-title">Couldn't render the diagram</h2>
        <p class="error-hint">
          The graph model was invalid, so nothing was drawn. Fix the issues below
          and regenerate the diagram.
        </p>
        <ul id="error-list"></ul>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
