<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas for Copilot</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-base: #0b0a12;
        --bg-glow-1: rgba(139, 92, 246, 0.2);
        --bg-glow-2: rgba(217, 70, 239, 0.14);
        --surface: rgba(30, 27, 46, 0.66);
        --surface-solid: #18152a;
        --surface-border: rgba(139, 92, 246, 0.35);
        --surface-shadow: rgba(124, 58, 237, 0.28);
        --surface-inset: rgba(255, 255, 255, 0.06);
        --divider: rgba(139, 92, 246, 0.25);
        --icon: #c4b5fd;
        --icon-hover: #ffffff;
        --hover-bg: rgba(139, 92, 246, 0.22);
        --hover-bg-strong: rgba(139, 92, 246, 0.3);
        --focus-ring: #a78bfa;
        --scrim: rgba(8, 7, 14, 0.82);
        --text: #e9e7f5;
        --text-muted: #a9a3c2;
        --list-text: #d9d4ee;
        --error-accent: #fb7185;
        --error-border: rgba(244, 63, 94, 0.4);
        --node-glow: rgba(139, 92, 246, 0.5);
      }

      [data-theme='light'] {
        color-scheme: light;
        --bg-base: #f4f3fb;
        --bg-glow-1: rgba(139, 92, 246, 0.12);
        --bg-glow-2: rgba(217, 70, 239, 0.08);
        --surface: rgba(255, 255, 255, 0.72);
        --surface-solid: #ffffff;
        --surface-border: rgba(124, 58, 237, 0.28);
        --surface-shadow: rgba(124, 58, 237, 0.16);
        --surface-inset: rgba(255, 255, 255, 0.6);
        --divider: rgba(124, 58, 237, 0.18);
        --icon: #6d28d9;
        --icon-hover: #4c1d95;
        --hover-bg: rgba(139, 92, 246, 0.14);
        --hover-bg-strong: rgba(139, 92, 246, 0.2);
        --focus-ring: #7c3aed;
        --scrim: rgba(40, 33, 64, 0.4);
        --text: #2a2440;
        --text-muted: #6b647e;
        --list-text: #4b4564;
        --error-accent: #e11d48;
        --error-border: rgba(225, 29, 72, 0.35);
        --node-glow: rgba(139, 92, 246, 0.32);
      }

      html,
      body {
        margin: 0;
        height: 100%;
        width: 100%;
        font-family:
          'Segoe UI Variable Display',
          'Segoe UI',
          system-ui,
          -apple-system,
          'Helvetica Neue',
          Arial,
          sans-serif;
        background: var(--bg-base);
      }

      #cy {
        position: absolute;
        inset: 0;
        height: 100%;
        width: 100%;
        background:
          radial-gradient(
            1100px 600px at 18% -10%,
            var(--bg-glow-1),
            transparent 60%
          ),
          radial-gradient(
            900px 520px at 100% 0%,
            var(--bg-glow-2),
            transparent 55%
          ),
          var(--bg-base);
        transition: background 0.3s ease;
      }

      /* Soft node/edge glow — a real blur (Cytoscape has no native shadow). */
      #cy canvas {
        filter: drop-shadow(0 0 5px var(--node-glow));
      }

      /* Zoom / reset / theme controls — glass cluster, top-right (FR-3). */
      #controls {
        position: absolute;
        top: 16px;
        right: 16px;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      .zoom-group {
        display: flex;
        flex-direction: column;
        border-radius: 16px;
        overflow: hidden;
        background: var(--surface);
        backdrop-filter: blur(14px) saturate(160%);
        -webkit-backdrop-filter: blur(14px) saturate(160%);
        border: 1px solid var(--surface-border);
        box-shadow:
          0 8px 26px var(--surface-shadow),
          inset 0 1px 0 var(--surface-inset);
      }

      .control-btn {
        width: 44px;
        height: 44px;
        display: grid;
        place-items: center;
        padding: 0;
        border: none;
        background: transparent;
        color: var(--icon);
        cursor: pointer;
        transition:
          background 0.18s ease,
          color 0.18s ease,
          box-shadow 0.18s ease,
          transform 0.12s ease;
      }

      .control-btn:hover {
        background: var(--hover-bg);
        color: var(--icon-hover);
      }

      .control-btn:active {
        transform: scale(0.9);
      }

      .control-btn:focus-visible {
        outline: 2px solid var(--focus-ring);
        outline-offset: -2px;
      }

      .control-btn svg {
        width: 20px;
        height: 20px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .zoom-group .control-btn + .control-btn {
        border-top: 1px solid var(--divider);
      }

      .reset-btn {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: var(--surface);
        backdrop-filter: blur(14px) saturate(160%);
        -webkit-backdrop-filter: blur(14px) saturate(160%);
        border: 1px solid var(--surface-border);
        box-shadow:
          0 8px 26px var(--surface-shadow),
          inset 0 1px 0 var(--surface-inset);
      }

      .reset-btn:hover {
        background: var(--hover-bg-strong);
        box-shadow:
          0 10px 30px var(--surface-shadow),
          inset 0 1px 0 var(--surface-inset);
      }

      /* "More" controls popover — collapses theme / legend / export. */
      .more-wrap {
        position: relative;
      }

      #more-btn svg circle {
        fill: currentColor;
        stroke: none;
      }

      #more-menu {
        position: absolute;
        top: 0;
        right: calc(100% + 12px);
        z-index: 30;
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 190px;
        padding: 6px;
        border-radius: 14px;
        background: var(--surface);
        backdrop-filter: blur(16px) saturate(160%);
        -webkit-backdrop-filter: blur(16px) saturate(160%);
        border: 1px solid var(--surface-border);
        box-shadow:
          0 14px 40px var(--surface-shadow),
          inset 0 1px 0 var(--surface-inset);
      }

      #more-menu[hidden] {
        display: none;
      }

      .more-item {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: var(--text);
        font: inherit;
        font-size: 13px;
        text-align: left;
        cursor: pointer;
        transition: background 0.14s ease;
      }

      .more-item > span {
        flex: 1;
      }

      .more-item svg {
        width: 16px;
        height: 16px;
        flex: none;
        fill: none;
        stroke: var(--icon);
        stroke-width: 1.9;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .more-item:hover {
        background: var(--hover-bg);
      }

      .more-item:disabled {
        opacity: 0.4;
        cursor: default;
        background: transparent;
      }

      .more-item:hover svg {
        stroke: var(--icon-hover);
      }

      .more-item:focus-visible {
        outline: 2px solid var(--focus-ring);
        outline-offset: -2px;
      }

      /* Theme toggle: show the icon of the theme you'll switch TO. */
      .icon-sun,
      .icon-moon {
        display: none;
      }

      [data-theme='dark'] #theme-toggle-btn .icon-sun {
        display: block;
      }

      [data-theme='light'] #theme-toggle-btn .icon-moon {
        display: block;
      }

      /* Diagram title — glass pill, top-left. */
      #title-bar {
        position: absolute;
        top: 16px;
        left: 16px;
        z-index: 10;
        max-width: 60vw;
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 8px 14px;
        border-radius: 14px;
        background: var(--surface);
        backdrop-filter: blur(14px) saturate(160%);
        -webkit-backdrop-filter: blur(14px) saturate(160%);
        border: 1px solid var(--surface-border);
        box-shadow:
          0 8px 26px var(--surface-shadow),
          inset 0 1px 0 var(--surface-inset);
      }

      /* Drill-down "Back to previous scope" button — appears once you Expand. */
      #scope-back-btn {
        flex: none;
        width: 30px;
        height: 30px;
        display: grid;
        place-items: center;
        padding: 0;
        margin: 0;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: var(--icon);
        cursor: pointer;
        transition:
          background 0.15s ease,
          color 0.15s ease;
      }

      #scope-back-btn:hover {
        background: var(--hover-bg);
        color: var(--icon-hover);
      }

      #scope-back-btn:focus-visible {
        outline: 2px solid var(--focus-ring);
        outline-offset: -2px;
      }

      #scope-back-btn[hidden] {
        display: none;
      }

      #scope-back-btn svg {
        width: 18px;
        height: 18px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      /* Hamburger button by the title that opens the diagram history (KAN-34). */
      #history-btn {
        flex: none;
        width: 30px;
        height: 30px;
        display: grid;
        place-items: center;
        padding: 0;
        margin: 0;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: var(--icon);
        cursor: pointer;
        transition:
          background 0.15s ease,
          color 0.15s ease;
      }

      #history-btn:hover:not(:disabled) {
        background: var(--hover-bg);
        color: var(--icon-hover);
      }

      #history-btn:disabled {
        opacity: 0.4;
        cursor: default;
      }

      #history-btn:focus-visible {
        outline: 2px solid var(--focus-ring);
        outline-offset: -2px;
      }

      #history-btn svg {
        width: 18px;
        height: 18px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      /* History dropdown — the list of diagram versions. */
      #history-menu {
        position: absolute;
        top: 60px;
        left: 16px;
        z-index: 40;
        width: 280px;
        max-height: 50vh;
        overflow-y: auto;
        padding: 8px;
        border-radius: 14px;
        background: var(--surface-solid);
        border: 1px solid var(--surface-border);
        box-shadow: 0 14px 40px var(--surface-shadow);
        color: var(--text);
      }

      #history-menu[hidden] {
        display: none;
      }

      .history-head {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--text-muted);
        padding: 4px 8px 8px;
      }

      .history-item {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        padding: 8px 10px;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: inherit;
        font: inherit;
        font-size: 13px;
        text-align: left;
        cursor: pointer;
        transition: background 0.14s ease;
      }

      .history-item:hover {
        background: var(--hover-bg);
      }

      .history-item.is-current {
        background: var(--hover-bg-strong);
      }

      .history-num {
        flex: none;
        min-width: 28px;
        font-variant-numeric: tabular-nums;
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
      }

      .history-label {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .history-current-tag {
        flex: none;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        color: var(--focus-ring);
      }

      .history-empty {
        padding: 8px 10px 10px;
        font-size: 12px;
        color: var(--text-muted);
      }

      .history-empty[hidden] {
        display: none;
      }

      #diagram-title {
        margin: 0;
        padding: 3px 8px;
        font-size: 18px;
        font-weight: 600;
        line-height: 1.3;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        border-radius: 8px;
        cursor: text;
        outline: none;
        transition:
          background 0.15s ease,
          box-shadow 0.15s ease;
      }

      #diagram-title:hover {
        background: var(--hover-bg);
      }

      #diagram-title:focus {
        background: var(--hover-bg);
        box-shadow: 0 0 0 2px var(--focus-ring);
      }

      #diagram-title.is-placeholder {
        color: var(--text-muted);
        font-weight: 500;
        font-style: italic;
      }

      /* Node context menu — right-click a node to edit its label + colour. */
      #node-menu {
        position: fixed;
        z-index: 50;
        min-width: 208px;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        border-radius: 14px;
        background: var(--surface);
        backdrop-filter: blur(16px) saturate(160%);
        -webkit-backdrop-filter: blur(16px) saturate(160%);
        border: 1px solid var(--surface-border);
        box-shadow:
          0 14px 40px var(--surface-shadow),
          inset 0 1px 0 var(--surface-inset);
        color: var(--text);
      }

      #node-menu[hidden] {
        display: none;
      }

      /* Expand-node dialog — centered modal to choose expansion type/depth. */
      #expand-dialog {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        z-index: 60;
        min-width: 260px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        border-radius: 14px;
        background: var(--surface);
        backdrop-filter: blur(16px) saturate(160%);
        -webkit-backdrop-filter: blur(16px) saturate(160%);
        border: 1px solid var(--surface-border);
        box-shadow:
          0 18px 50px var(--surface-shadow),
          inset 0 1px 0 var(--surface-inset);
        color: var(--text);
      }

      #expand-dialog[hidden] {
        display: none;
      }

      /* Export / download popover — anchored under the toolbar, top-right. */
      #export-menu {
        position: absolute;
        top: 16px;
        right: 76px;
        z-index: 60;
        min-width: 232px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        border-radius: 14px;
        background: var(--surface);
        backdrop-filter: blur(16px) saturate(160%);
        -webkit-backdrop-filter: blur(16px) saturate(160%);
        border: 1px solid var(--surface-border);
        box-shadow:
          0 18px 50px var(--surface-shadow),
          inset 0 1px 0 var(--surface-inset);
        color: var(--text);
      }

      #export-menu[hidden] {
        display: none;
      }

      /* Node/link search bar (KAN-38) — top-centre glass pill. */
      #search-bar {
        position: absolute;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 40;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 8px 6px 12px;
        border-radius: 14px;
        background: var(--surface);
        backdrop-filter: blur(14px) saturate(160%);
        -webkit-backdrop-filter: blur(14px) saturate(160%);
        border: 1px solid var(--surface-border);
        box-shadow:
          0 8px 26px var(--surface-shadow),
          inset 0 1px 0 var(--surface-inset);
        color: var(--text);
      }

      #search-bar[hidden] {
        display: none;
      }

      #search-bar .search-icon {
        width: 16px;
        height: 16px;
        flex: none;
        fill: none;
        stroke: var(--icon);
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      #search-input {
        font: inherit;
        font-size: 13px;
        width: 200px;
        padding: 4px 2px;
        border: none;
        background: transparent;
        color: var(--text);
        outline: none;
      }

      #search-input::placeholder {
        color: var(--text-muted);
      }

      .search-count {
        font-size: 12px;
        color: var(--text-muted);
        min-width: 34px;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      .search-nav {
        width: 28px;
        height: 28px;
        display: grid;
        place-items: center;
        padding: 0;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: var(--icon);
        cursor: pointer;
        transition: background 0.14s ease;
      }

      .search-nav:hover {
        background: var(--hover-bg);
        color: var(--icon-hover);
      }

      .search-nav svg {
        width: 16px;
        height: 16px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .export-field {
        display: flex;
        flex-direction: column;
        gap: 5px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--text-muted);
      }

      .export-field[hidden] {
        display: none;
      }

      .export-check {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--text);
        cursor: pointer;
      }

      .export-check input {
        width: 16px;
        height: 16px;
        accent-color: var(--focus-ring);
        cursor: pointer;
      }

      #export-bg.menu-input {
        padding: 4px;
        height: 34px;
        cursor: pointer;
      }

      .expand-field {
        display: flex;
        flex-direction: column;
        gap: 5px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--text-muted);
      }

      select.menu-input {
        cursor: pointer;
      }

      .menu-section {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--text-muted);
      }

      .menu-divider {
        height: 1px;
        margin: 2px 0;
        background: var(--divider);
      }

      .menu-input {
        font: inherit;
        font-size: 14px;
        padding: 7px 10px;
        border-radius: 8px;
        border: 1px solid var(--surface-border);
        background: var(--hover-bg);
        color: var(--text);
        outline: none;
        transition: box-shadow 0.15s ease;
      }

      .menu-input:focus {
        box-shadow: 0 0 0 2px var(--focus-ring);
      }

      .swatches {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 6px;
      }

      .swatch {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        cursor: pointer;
        padding: 0;
        transition: transform 0.1s ease;
      }

      .swatch:hover {
        transform: scale(1.12);
      }

      .swatch.custom {
        display: grid;
        place-items: center;
        position: relative;
        overflow: hidden;
        background: var(--hover-bg);
        color: var(--text-muted);
        font-size: 16px;
        font-weight: 600;
      }

      .swatch.custom input {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
      }

      /* Readable error overlay — shown instead of a blank canvas (FR-1, TC-2). */
      #error {
        position: absolute;
        inset: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: var(--scrim);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
      }

      #error[hidden] {
        display: none;
      }

      .error-card {
        max-width: 520px;
        width: 100%;
        background: var(--surface-solid);
        border-radius: 16px;
        border: 1px solid var(--error-border);
        border-top: 3px solid var(--error-accent);
        padding: 22px 26px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
        color: var(--text);
      }

      .error-card h2 {
        margin: 0 0 8px;
        font-size: 16px;
        color: var(--error-accent);
      }

      .error-hint {
        margin: 0 0 12px;
        font-size: 13px;
        color: var(--text-muted);
      }

      #error-list {
        margin: 0;
        padding-left: 20px;
        font-size: 13px;
        line-height: 1.6;
        color: var(--list-text);
      }

      #error-list li {
        margin-bottom: 4px;
      }

      /* Colour legend — explains what node/status colours mean (KAN-30). */
      #legend {
        position: absolute;
        bottom: 16px;
        left: 16px;
        z-index: 10;
        max-width: 240px;
        padding: 12px 14px;
        border-radius: 14px;
        background: var(--surface);
        backdrop-filter: blur(14px) saturate(160%);
        -webkit-backdrop-filter: blur(14px) saturate(160%);
        border: 1px solid var(--surface-border);
        box-shadow:
          0 8px 26px var(--surface-shadow),
          inset 0 1px 0 var(--surface-inset);
        color: var(--text);
        font-size: 12px;
      }

      #legend[hidden] {
        display: none;
      }

      #legend h2 {
        margin: 0 0 8px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      .legend-row {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 2px 0;
        line-height: 1.4;
      }

      .legend-swatch {
        flex: none;
        width: 13px;
        height: 13px;
        border-radius: 4px;
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.2);
      }

      .legend-swatch.is-edge {
        height: 0;
        border-radius: 0;
        box-shadow: none;
        border-top: 3px solid currentColor;
      }

      /* Code references + actions inside the node context menu (KAN-31/32). */
      #node-code {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      #node-code[hidden] {
        display: none;
      }

      .coderefs {
        display: flex;
        flex-direction: column;
        gap: 4px;
        max-height: 168px;
        overflow-y: auto;
      }

      .coderef-row {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        padding: 7px 9px;
        border: 1px solid var(--surface-border);
        border-radius: 8px;
        background: var(--hover-bg);
        color: var(--text);
        font: inherit;
        font-size: 12.5px;
        text-align: left;
        cursor: pointer;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        transition: background 0.14s ease;
      }

      .coderef-row::before {
        content: '';
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #34d399;
        flex: none;
      }

      .coderef-row:hover {
        background: var(--hover-bg-strong);
      }

      .menu-actions {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .menu-action {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: var(--text);
        font: inherit;
        font-size: 13px;
        text-align: left;
        cursor: pointer;
        transition: background 0.14s ease;
      }

      .menu-action > span {
        flex: 1;
      }

      .menu-action svg {
        width: 16px;
        height: 16px;
        flex: none;
        fill: none;
        stroke: var(--icon);
        stroke-width: 1.9;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .menu-action:hover {
        background: var(--hover-bg);
      }

      .menu-action:hover svg {
        stroke: var(--icon-hover);
      }

      .menu-action:focus-visible {
        outline: 2px solid var(--focus-ring);
        outline-offset: -2px;
      }

      /* Chevron on the "Change colour" toggle rotates when the swatches show. */
      .menu-action .chevron {
        width: 14px;
        height: 14px;
        transition: transform 0.16s ease;
      }

      .menu-action[aria-expanded='true'] .chevron {
        transform: rotate(90deg);
      }

      #node-swatches[hidden] {
        display: none;
      }

      #node-swatches {
        padding: 4px 4px 6px;
      }
    </style>
  </head>
  <body>
    <div id="cy"></div>

    <div id="title-bar">
      <button
        id="scope-back-btn"
        type="button"
        title="Back to previous scope"
        aria-label="Back to previous scope"
        hidden
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <line x1="19" y1="12" x2="5" y2="12" />
          <path d="M12 19l-7-7 7-7" />
        </svg>
      </button>
      <button
        id="history-btn"
        type="button"
        title="Diagram history — jump to an earlier version"
        aria-label="Diagram history"
        aria-haspopup="menu"
        aria-expanded="false"
        disabled
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <line x1="4" y1="7" x2="20" y2="7" />
          <line x1="4" y1="12" x2="20" y2="12" />
          <line x1="4" y1="17" x2="20" y2="17" />
        </svg>
      </button>
      <h1
        id="diagram-title"
        class="is-placeholder"
        contenteditable="true"
        spellcheck="false"
        aria-label="Diagram title — click to rename"
        title="Click to rename"
      >
        Untitled diagram
      </h1>
    </div>

    <div id="history-menu" hidden role="menu" aria-label="Diagram history">
      <div class="history-head">History</div>
      <div id="history-list"></div>
      <div id="history-empty" class="history-empty">No history yet.</div>
    </div>

    <div id="controls" role="group" aria-label="Zoom and view controls">
      <div class="zoom-group">
        <button
          id="zoom-in-btn"
          class="control-btn"
          type="button"
          title="Zoom in"
          aria-label="Zoom in"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
        </button>
        <button
          id="zoom-out-btn"
          class="control-btn"
          type="button"
          title="Zoom out"
          aria-label="Zoom out"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
        </button>
      </div>
      <button
        id="reset-btn"
        class="control-btn reset-btn"
        type="button"
        title="Reset view (fit to screen)"
        aria-label="Reset view"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 9V5a1 1 0 0 1 1-1h4" />
          <path d="M20 9V5a1 1 0 0 0-1-1h-4" />
          <path d="M4 15v4a1 1 0 0 0 1 1h4" />
          <path d="M20 15v4a1 1 0 0 1-1 1h-4" />
        </svg>
      </button>
      <div class="more-wrap">
        <button
          id="more-btn"
          class="control-btn reset-btn"
          type="button"
          title="More controls"
          aria-label="More controls"
          aria-haspopup="menu"
          aria-expanded="false"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="5" r="1.7" />
            <circle cx="12" cy="12" r="1.7" />
            <circle cx="12" cy="19" r="1.7" />
          </svg>
        </button>
        <div id="more-menu" hidden role="menu" aria-label="More controls">
          <button
            id="undo-btn"
            class="more-item"
            type="button"
            role="menuitem"
            title="Undo last change (Ctrl/Cmd+Z)"
            aria-label="Undo last change"
            disabled
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9 14L4 9l5-5" />
              <path d="M4 9h11a5 5 0 0 1 0 10H8" />
            </svg>
            <span>Undo</span>
          </button>
          <button
            id="redo-btn"
            class="more-item"
            type="button"
            role="menuitem"
            title="Redo last undone change (Ctrl+Y or Ctrl/Cmd+Shift+Z)"
            aria-label="Redo last undone change"
            disabled
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 14l5-5-5-5" />
              <path d="M20 9H9a5 5 0 0 0 0 10h8" />
            </svg>
            <span>Redo</span>
          </button>
          <button
            id="search-toggle"
            class="more-item"
            type="button"
            role="menuitem"
            title="Search nodes &amp; links (Ctrl/Cmd+F)"
            aria-label="Search nodes and links"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="7" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <span>Search</span>
          </button>
          <button
            id="theme-toggle-btn"
            class="more-item"
            type="button"
            role="menuitem"
            title="Switch theme"
            aria-label="Switch theme"
          >
            <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="4" />
              <path
                d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"
              />
            </svg>
            <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z" />
            </svg>
            <span>Theme</span>
          </button>
          <button
            id="legend-toggle-btn"
            class="more-item"
            type="button"
            role="menuitem"
            title="Toggle colour legend"
            aria-label="Toggle colour legend"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="6" cy="7" r="2.2" />
              <line x1="11" y1="7" x2="20" y2="7" />
              <circle cx="6" cy="12" r="2.2" />
              <line x1="11" y1="12" x2="20" y2="12" />
              <circle cx="6" cy="17" r="2.2" />
              <line x1="11" y1="17" x2="20" y2="17" />
            </svg>
            <span>Legend</span>
          </button>
          <button
            id="export-btn"
            class="more-item"
            type="button"
            role="menuitem"
            title="Download as image"
            aria-label="Download as image"
            aria-haspopup="dialog"
            aria-expanded="false"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3v12" />
              <path d="M7 10l5 5 5-5" />
              <path d="M5 20h14" />
            </svg>
            <span>Download image</span>
          </button>
        </div>
      </div>
    </div>

    <div id="export-menu" hidden role="dialog" aria-label="Download diagram">
      <span class="menu-section">Download image</span>
      <label class="export-field">
        <span>Format</span>
        <select id="export-format" class="menu-input">
          <option value="png" selected>PNG (raster)</option>
          <option value="jpg">JPG (raster)</option>
          <option value="svg">SVG (vector)</option>
        </select>
      </label>
      <label class="export-field" id="export-scale-field">
        <span>Size</span>
        <select id="export-scale" class="menu-input">
          <option value="1">1× (on-screen)</option>
          <option value="2" selected>2× (high-res)</option>
          <option value="3">3× (max)</option>
        </select>
      </label>
      <label class="export-field">
        <span>Area</span>
        <select id="export-area" class="menu-input">
          <option value="full" selected>Whole graph</option>
          <option value="viewport">Current viewport</option>
        </select>
      </label>
      <label class="export-check">
        <input id="export-transparent" type="checkbox" checked />
        <span>Transparent background</span>
      </label>
      <label class="export-field" id="export-bg-field" hidden>
        <span>Background colour</span>
        <input id="export-bg" class="menu-input" type="color" value="#0b0a12" />
      </label>
      <div class="menu-actions">
        <button id="export-cancel" class="menu-action" type="button">
          Cancel
        </button>
        <button id="export-download" class="menu-action" type="button">
          Download
        </button>
      </div>
    </div>

    <div id="legend" role="group" aria-label="Colour legend" hidden>
      <h2>Legend</h2>
      <div id="legend-rows"></div>
    </div>

    <div id="search-bar" hidden role="search" aria-label="Search nodes and links">
      <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="11" cy="11" r="7" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
      </svg>
      <input
        id="search-input"
        type="text"
        placeholder="Search nodes &amp; links…"
        autocomplete="off"
        spellcheck="false"
        aria-label="Search query"
      />
      <span id="search-count" class="search-count"></span>
      <button
        id="search-prev"
        class="search-nav"
        type="button"
        title="Previous match (Shift+Enter)"
        aria-label="Previous match"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M18 15l-6-6-6 6" />
        </svg>
      </button>
      <button
        id="search-next"
        class="search-nav"
        type="button"
        title="Next match (Enter)"
        aria-label="Next match"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 9l6 6 6-6" />
        </svg>
      </button>
      <button
        id="search-close"
        class="search-nav"
        type="button"
        title="Close (Esc)"
        aria-label="Close search"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <line x1="6" y1="6" x2="18" y2="18" />
          <line x1="6" y1="18" x2="18" y2="6" />
        </svg>
      </button>
    </div>

    <div id="node-menu" hidden role="menu" aria-label="Edit node">
      <input
        id="node-label-input"
        class="menu-input"
        type="text"
        autocomplete="off"
        spellcheck="false"
        placeholder="Node label"
        aria-label="Node label"
      />

      <div class="menu-divider"></div>

      <div class="menu-actions">
        <button id="node-explain" class="menu-action" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 15a2 2 0 0 1-2 2H8l-4 4V5a2 2 0 0 1 2-2h13a2 2 0 0 1 2 2z" />
          </svg>
          <span>Explain</span>
        </button>
        <button id="node-expand" class="menu-action" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3l1.7 4.3L18 9l-4.3 1.7L12 15l-1.7-4.3L6 9l4.3-1.7z" />
            <path d="M18 14l.9 2.1 2.1.9-2.1.9-.9 2.1-.9-2.1-2.1-.9 2.1-.9z" />
          </svg>
          <span>Expand with AI</span>
        </button>
        <button id="ctx-expand" class="menu-action" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="3" />
            <path d="M12 2v3M12 19v3M2 12h3M19 12h3" />
          </svg>
          <span>Focus neighbours</span>
        </button>
        <button
          id="node-color-toggle"
          class="menu-action"
          type="button"
          aria-expanded="false"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M12 3a9 9 0 1 0 0 18c.9 0 1.5-.7 1.5-1.5 0-.4-.2-.8-.4-1-.3-.3-.4-.6-.4-1 0-.8.7-1.5 1.5-1.5H16a5 5 0 0 0 5-5c0-4.4-4-8-9-8z"
            />
            <circle cx="7.5" cy="11.5" r="1" />
            <circle cx="12" cy="8.5" r="1" />
            <circle cx="16.5" cy="11.5" r="1" />
          </svg>
          <span>Change colour</span>
          <svg class="chevron" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9 6l6 6-6 6" />
          </svg>
        </button>
        <div id="node-swatches" class="swatches" hidden></div>
        <button id="node-center" class="menu-action" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 9V5a1 1 0 0 1 1-1h4" />
            <path d="M20 9V5a1 1 0 0 0-1-1h-4" />
            <path d="M4 15v4a1 1 0 0 0 1 1h4" />
            <path d="M20 15v4a1 1 0 0 1-1 1h-4" />
          </svg>
          <span>Center</span>
        </button>
      </div>

      <div id="node-code" hidden>
        <div class="menu-divider"></div>
        <span class="menu-section">Code references</span>
        <div id="node-coderefs" class="coderefs"></div>
      </div>
    </div>

    <div id="expand-dialog" hidden role="dialog" aria-label="Expand node">
      <span class="menu-section">Expand node</span>
      <label class="expand-field">
        <span>Type of expansion</span>
        <select id="expand-mode" class="menu-input">
          <option value="annotation">Brief annotation / note</option>
          <option value="detail" selected>More detail (a few nodes)</option>
          <option value="subgraph">Full sub-graph</option>
        </select>
      </label>
      <label class="expand-field">
        <span>Depth</span>
        <select id="expand-depth" class="menu-input">
          <option value="1" selected>1 level</option>
          <option value="2">2 levels</option>
          <option value="3">3 levels</option>
        </select>
      </label>
      <label class="expand-field">
        <span>Focus (optional)</span>
        <input
          id="expand-focus"
          class="menu-input"
          type="text"
          autocomplete="off"
          spellcheck="false"
          placeholder="e.g. error handling"
        />
      </label>
      <div class="menu-actions">
        <button id="expand-cancel" class="menu-action" type="button">
          Cancel
        </button>
        <button id="expand-submit" class="menu-action" type="button">
          Expand
        </button>
      </div>
    </div>

    <div id="error" role="alert" hidden>
      <div class="error-card">
        <h2 id="error-title">Couldn't render the diagram</h2>
        <p class="error-hint">
          The graph model was invalid, so nothing was drawn. Fix the issues below
          and regenerate the diagram.
        </p>
        <ul id="error-list"></ul>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
