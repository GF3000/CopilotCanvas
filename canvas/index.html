<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas for Copilot</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        width: 100%;
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          sans-serif;
      }

      #cy {
        position: absolute;
        inset: 0;
        height: 100%;
        width: 100%;
      }

      /* Zoom / reset controls — frosted-glass cluster, top-right (FR-3). */
      #controls {
        position: absolute;
        top: 16px;
        right: 16px;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }

      .zoom-group {
        display: flex;
        flex-direction: column;
        border-radius: 14px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.78);
        backdrop-filter: blur(12px) saturate(140%);
        -webkit-backdrop-filter: blur(12px) saturate(140%);
        border: 1px solid rgba(148, 163, 184, 0.32);
        box-shadow: 0 6px 18px rgba(15, 23, 42, 0.18);
      }

      .control-btn {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        padding: 0;
        border: none;
        background: transparent;
        color: #334155;
        cursor: pointer;
        transition:
          background 0.16s ease,
          color 0.16s ease,
          transform 0.12s ease;
      }

      .control-btn:hover {
        background: rgba(226, 232, 240, 0.85);
        color: #0f172a;
      }

      .control-btn:active {
        transform: scale(0.9);
      }

      .control-btn:focus-visible {
        outline: 2px solid #2563eb;
        outline-offset: -2px;
      }

      .control-btn svg {
        width: 20px;
        height: 20px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .zoom-group .control-btn + .control-btn {
        border-top: 1px solid rgba(148, 163, 184, 0.3);
      }

      .reset-btn {
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.78);
        backdrop-filter: blur(12px) saturate(140%);
        -webkit-backdrop-filter: blur(12px) saturate(140%);
        border: 1px solid rgba(148, 163, 184, 0.32);
        box-shadow: 0 6px 18px rgba(15, 23, 42, 0.18);
      }

      .reset-btn:hover {
        background: rgba(226, 232, 240, 0.92);
      }

      /* Readable error overlay — shown instead of a blank canvas (FR-1, TC-2). */
      #error {
        position: absolute;
        inset: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: rgba(15, 23, 42, 0.78);
      }

      #error[hidden] {
        display: none;
      }

      .error-card {
        max-width: 520px;
        width: 100%;
        background: #ffffff;
        border-radius: 10px;
        border-top: 4px solid #dc2626;
        padding: 20px 24px;
        box-shadow: 0 8px 30px rgba(15, 23, 42, 0.35);
        color: #1e293b;
      }

      .error-card h2 {
        margin: 0 0 8px;
        font-size: 16px;
        color: #b91c1c;
      }

      .error-hint {
        margin: 0 0 12px;
        font-size: 13px;
        color: #475569;
      }

      #error-list {
        margin: 0;
        padding-left: 20px;
        font-size: 13px;
        line-height: 1.5;
      }

      #error-list li {
        margin-bottom: 4px;
      }
    </style>
  </head>
  <body>
    <div id="cy"></div>

    <div id="controls" role="group" aria-label="Zoom and view controls">
      <div class="zoom-group">
        <button
          id="zoom-in-btn"
          class="control-btn"
          type="button"
          title="Zoom in"
          aria-label="Zoom in"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
        </button>
        <button
          id="zoom-out-btn"
          class="control-btn"
          type="button"
          title="Zoom out"
          aria-label="Zoom out"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
        </button>
      </div>
      <button
        id="reset-btn"
        class="control-btn reset-btn"
        type="button"
        title="Reset view (fit to screen)"
        aria-label="Reset view"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 9V5a1 1 0 0 1 1-1h4" />
          <path d="M20 9V5a1 1 0 0 0-1-1h-4" />
          <path d="M4 15v4a1 1 0 0 0 1 1h4" />
          <path d="M20 15v4a1 1 0 0 1-1 1h-4" />
        </svg>
      </button>
    </div>

    <div id="error" role="alert" hidden>
      <div class="error-card">
        <h2 id="error-title">Couldn't render the diagram</h2>
        <p class="error-hint">
          The graph model was invalid, so nothing was drawn. Fix the issues below
          and regenerate the diagram.
        </p>
        <ul id="error-list"></ul>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
